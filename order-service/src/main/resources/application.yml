server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/orderdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:0000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    template:
      # Propagate the current trace into produced records (traceparent header)
      # so consumers continue the same trace.
      observation-enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

inventory:
  service:
    url: http://inventory-service

resilience4j:
  circuitbreaker:
    instances:
      inventory:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      inventory:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: order-service
    description: Order placement and order lifecycle; publishes OrderCreated events to Kafka

---
# Structured JSON logging: one ECS document per line, traceId/spanId included
# as fields. Activate with SPRING_PROFILES_ACTIVE=json-logs (e.g. in
# containers); the default profile keeps human-readable console output, which
# already carries [app,traceId,spanId] correlation while tracing is active.
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: ecs
