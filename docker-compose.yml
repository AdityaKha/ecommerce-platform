# Full local stack: infrastructure (Postgres, Kafka, Mailpit, Jaeger) plus all
# 7 services and the Angular UI.
#
#   cp .env.example .env   # fill in JWT_SECRET / INTERNAL_TOKEN / DB_PASSWORD
#   docker compose up --build
#
# Entry points on the host:
#   http://localhost:4200   Angular UI
#   http://localhost:8080   API gateway (the UI's apiUrl points here)
#   http://localhost:8761   Eureka dashboard
#   http://localhost:8025   Mailpit UI (order-confirmation emails land here)
#   http://localhost:16686  Jaeger UI (distributed traces)
#
# Infra host ports are shifted (15432, 29092) so the stack can run alongside a
# locally installed Postgres/Kafka on the default ports.

name: ecommerce-platform

services:
  # ---------------------------------------------------------------- infra ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      # No default on purpose — set in .env (cp .env.example .env).
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env (cp .env.example .env)}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      # Services on the compose network reach the broker as kafka:9092; host
      # tools (kcat, IDE Kafka plugins) use localhost:29092.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  mailpit:
    # Dev SMTP catcher: notification-service delivers order emails here.
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI; SMTP (1025) stays internal to the compose network

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI; OTLP (4318) stays internal to the compose network

  # ------------------------------------------------------------- services ---
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      # The temurin JRE image has no curl; a bash TCP probe is enough to gate
      # dependent services on the registry accepting connections.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8761"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment: &common-env
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      # Secrets have no defaults on purpose — set them in .env (cp .env.example
      # .env). DB_PASSWORD/JWT_SECRET/INTERNAL_TOKEN are shared via this anchor;
      # services that don't need one simply ignore it.
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (cp .env.example .env)}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:?Set INTERNAL_TOKEN in .env (cp .env.example .env)}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env (cp .env.example .env)}
      # Uncomment (or export SPRING_PROFILES_ACTIVE=json-logs) for ECS JSON logs:
      # SPRING_PROFILES_ACTIVE: json-logs
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      <<: *common-env
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      <<: *common-env
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      <<: *common-env
      DB_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    environment:
      <<: *common-env
      DB_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    environment:
      <<: *common-env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mailpit:
        condition: service_started

  angular-ui:
    build:
      context: angular-ui
    ports:
      # Served on 4200 to match the gateway's CORS allowed origin.
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  pgdata:
