server:
  port: 8084

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/inventorydb
    username: ${DB_USERNAME:postgres}
    # No default on purpose: the service fails fast at startup if DB_PASSWORD
    # is not provided (see README "Environment Variables").
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: inventory-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer delegates to JsonDeserializer and converts
      # deserialization failures into a DeserializationException the
      # DefaultErrorHandler can log-and-drop; a bare JsonDeserializer failure
      # happens inside poll() and loops on the same record forever.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # The producer's __TypeId__ header names order-service's event class,
        # which doesn't exist here — ignore headers and always bind the payload
        # to this service's own event type (DTO-per-service, shared schema).
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.aditya.ecommerce.inventory.event.OrderCreatedEvent
    listener:
      # Continue the producer's trace (traceparent record header) in listener
      # processing so Kafka hops show up in the same distributed trace.
      observation-enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

internal:
  # Shared secret proving a request came through api-gateway (or a trusted
  # sibling service, e.g. order-service's availability check) rather than
  # directly from the network. No default on purpose.
  token: ${INTERNAL_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: inventory-service
    description: Stock levels per product; consumes OrderCreated events to reserve stock

---
# Structured JSON logging: one ECS document per line, traceId/spanId included
# as fields. Activate with SPRING_PROFILES_ACTIVE=json-logs (e.g. in
# containers); the default profile keeps human-readable console output, which
# already carries [app,traceId,spanId] correlation while tracing is active.
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: ecs
