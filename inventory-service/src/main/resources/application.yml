server:
  port: 8084

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://localhost:5432/inventorydb
    username: postgres
    password: "0000"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: inventory-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.aditya.ecommerce.inventory.event
    listener:
      # Continue the producer's trace (traceparent record header) in listener
      # processing so Kafka hops show up in the same distributed trace.
      observation-enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: inventory-service
    description: Stock levels per product; consumes OrderCreated events to reserve stock

---
# Structured JSON logging: one ECS document per line, traceId/spanId included
# as fields. Activate with SPRING_PROFILES_ACTIVE=json-logs (e.g. in
# containers); the default profile keeps human-readable console output, which
# already carries [app,traceId,spanId] correlation while tracing is active.
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: ecs
