server:
  port: 8085

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.aditya.ecommerce.notification.event
    listener:
      # Continue the producer's trace (traceparent record header) in listener
      # processing so Kafka hops show up in the same distributed trace.
      observation-enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

# For local development, point this at a disposable SMTP catcher (e.g. MailHog/Mailpit
# on localhost:1025) so sent mail can be inspected without a real provider. In
# production, override via MAIL_HOST/MAIL_PORT/MAIL_USERNAME/MAIL_PASSWORD env vars
# for a real SMTP provider (SendGrid, SES, etc.) — never hardcode credentials here.
notification:
  channel: ${NOTIFICATION_CHANNEL:EMAIL}
  mail:
    from: ${NOTIFICATION_MAIL_FROM:no-reply@ecommerce-platform.local}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: notification-service
    description: Consumes domain events and sends customer notifications (email/SMS/push)

---
# Structured JSON logging: one ECS document per line, traceId/spanId included
# as fields. Activate with SPRING_PROFILES_ACTIVE=json-logs (e.g. in
# containers); the default profile keeps human-readable console output, which
# already carries [app,traceId,spanId] correlation while tracing is active.
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: ecs
