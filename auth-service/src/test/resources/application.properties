# Test-only values for env-var placeholders that intentionally have no
# defaults in application.yml (Day 15 security hardening). Real database
# connections in ITs come from Testcontainers @ServiceConnection, which
# overrides spring.datasource.*; these only keep placeholder resolution (and
# thus context startup) working.
DB_PASSWORD=test-only-db-password
JWT_SECRET=test-only-jwt-secret-0123456789abcdef0123456789abcdef
INTERNAL_TOKEN=test-only-internal-token
