server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/authdb
    username: ${DB_USERNAME:postgres}
    # No default on purpose: the service fails fast at startup if DB_PASSWORD
    # is not provided (see README "Environment Variables").
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  # No default on purpose: must be provided via env (min 32 bytes), shared with api-gateway.
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

internal:
  # Shared secret proving a request came through api-gateway (or a trusted
  # sibling service) rather than directly from the network. No default on purpose.
  token: ${INTERNAL_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: auth-service
    description: User registration, authentication and JWT issuance

---
# Structured JSON logging: one ECS document per line, traceId/spanId included
# as fields. Activate with SPRING_PROFILES_ACTIVE=json-logs (e.g. in
# containers); the default profile keeps human-readable console output, which
# already carries [app,traceId,spanId] correlation while tracing is active.
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: ecs
