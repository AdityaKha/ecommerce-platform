server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: postgres
    password: "0000"
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-min-32-bytes}
  expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: auth-service
    description: User registration, authentication and JWT issuance

---
# Structured JSON logging: one ECS document per line, traceId/spanId included
# as fields. Activate with SPRING_PROFILES_ACTIVE=json-logs (e.g. in
# containers); the default profile keeps human-readable console output, which
# already carries [app,traceId,spanId] correlation while tracing is active.
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: ecs
